name: Tesbihim
options:
  bundleIdPrefix: com.recepgur
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_LANGUAGE: tr
    ENABLE_USER_SCRIPT_SANDBOXING: true

targets:
  TesbihimApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/TesbihimApp
    resources:
      - path: Sources/TesbihimApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recepgur.tesbihim
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationPortraitUpsideDown
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Sources/TesbihimApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: Tesbihim
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Automatic
    scheme:
      testTargets:
        - TesbihimAppTests
        - TesbihimProjectTests
      commandLineArguments:
        "-UITest_DisableAnimations": false
      environmentVariables: {}

  TesbihimAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/TesbihimAppTests
    dependencies:
      - target: TesbihimApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

  TesbihimProjectTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/TesbihimProjectTests
    dependencies:
      - target: TesbihimApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

schemes:
  Tesbihim:
    build:
      targets:
        TesbihimApp: all
    test:
      targets:
        - TesbihimAppTests
        - TesbihimProjectTests
    run:
      config: Debug
